name: ai-core CI

on:
  push:
    paths:
      - "ai-core/**"
      - ".github/workflows/ai-core-ci.yml"
  pull_request:
    paths:
      - "ai-core/**"
      - ".github/workflows/ai-core-ci.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  test-ai-core:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  deprecation-forecast:
    name: Deprecation Forecast (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.16", "3.17"]
    defaults:
      run:
        working-directory: ai-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with raw warning visibility
        id: forecast_run
        run: |
          set +e
          pytest -q -W default -o filterwarnings=default 2>&1 | tee deprecation-forecast-${{ matrix.python-version }}.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize deprecation warnings
        if: always()
        run: |
          LOG_FILE="deprecation-forecast-${{ matrix.python-version }}.log"
          WARNING_COUNT=$(grep -c "DeprecationWarning" "$LOG_FILE" || true)
          echo "### Deprecation Forecast (Python ${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- pytest exit code: ${{ steps.forecast_run.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- DeprecationWarning count: ${WARNING_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${WARNING_COUNT}" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "First warnings:" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            grep -n "DeprecationWarning" "$LOG_FILE" | head -n 20 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload forecast log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deprecation-forecast-py${{ matrix.python-version }}
          path: ai-core/deprecation-forecast-${{ matrix.python-version }}.log